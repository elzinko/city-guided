# Pipeline CI pour Render staging
# Build + tests sur push/PR. Render déploie automatiquement au push sur main.
name: Pipeline (Render)

on:
  push:
    branches: ["main", "feature/**", "bugfix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BUILD & TEST (Single build, cached for all subsequent jobs)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Unit Tests
        run: pnpm run test

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            apps/*/dist
            apps/*/.next
            services/*/dist
            packages/*/dist
            .turbo
          key: build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ═══════════════════════════════════════════════════════════════════════════════
  # E2E TESTS (Uses cached build artifacts)
  # ═══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/*/dist
            apps/*/.next
            services/*/dist
            packages/*/dist
            .turbo
          key: build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            build-${{ runner.os }}-

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies (fast with cached store)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter apps-web-frontend exec playwright install --with-deps chromium

      - name: Generate .env.ci file
        run: |
          mkdir -p infra/config
          cat > infra/config/.env.ci << 'EOF'
          ENVIRONMENT=ci
          PROJECT_NAME=city-guided-ci
          SITE_DOMAIN=localhost
          API_PORT=4000
          WEB_PORT=3080
          OSRM_PORT=5001
          OSRM_URL=http://osrm:5000
          BUILD_MODE=local
          SHOULD_BUILD_LOCAL=true
          RESTART_POLICY=no
          NODE_ENV=test
          SHOW_DEV_OPTIONS=true
          DOCKER_ENV=true
          EOF

      - name: Start all services (using .env.ci)
        run: SKIP_OSRM_DATA_LOAD=true pnpm docker:start ci
        timeout-minutes: 5

      - name: Check container status
        run: |
          echo "📋 Container status:"
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "📋 Caddy port mapping (host:container):"
          docker port caddy 2>&1 || echo "Caddy container not found"
          echo ""
          echo "📋 Curl diagnostic (localhost:80):"
          curl -v -m 5 http://localhost:80 2>&1 || true
          echo ""
          echo "📋 Container logs (last 20 lines each):"
          docker logs api --tail 20 2>&1 || echo "API container not found"
          docker logs web --tail 20 2>&1 || echo "Web container not found"
          docker logs caddy --tail 20 2>&1 || echo "Caddy container not found"

      - name: Wait for all services
        run: SKIP_OSRM_DATA_LOAD=true pnpm docker:wait ci all
        timeout-minutes: 5

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          E2E_BASE_URL: http://localhost
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_PUBLIC_OSRM_URL: http://localhost/osrm

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: apps/web-frontend/test-results/
          retention-days: 1

      - name: Show logs on failure
        if: failure()
        run: pnpm docker:logs ci

      - name: Cleanup
        if: always()
        run: pnpm docker:stop ci
